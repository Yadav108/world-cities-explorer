<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌐 Urban Analytics</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="nav.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d1a; --bg2: #12122a; --border: #1e1e3a; --border2: #2a2a4a;
      --accent: #00cfff; --accent-b: #ff9f43; --text: #cdd6f4; --text2: #7799bb;
      --panel-w: 300px; --header-h: 60px;
    }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

    /* Header */
    #header {
      position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
      background: var(--bg2); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 20px; gap: 12px; z-index: 2000;
    }
    #hdr-title { font-size: 1rem; font-weight: 700; white-space: nowrap; }
    #hdr-country { color: var(--accent); font-weight: 700; font-size: 0.9rem; }
    #hdr-status { font-size: 0.75rem; color: var(--text2); }
    .toggle-wrap { margin-left: auto; display: flex; gap: 8px; }
    .toggle-btn {
      background: #1a1a2e; color: #7799bb; border: 1px solid #2a2a4a;
      border-radius: 20px; padding: 6px 16px; font-size: 0.8rem; cursor: pointer;
      transition: all 0.2s;
    }
    .toggle-btn.active { background: var(--accent); color: #0d0d1a; font-weight: 700; border-color: var(--accent); }
    .toggle-btn:not(.active):hover { border-color: var(--accent); color: var(--accent); }

    /* Map */
    #map { position: fixed; top: var(--header-h); left: 0; right: var(--panel-w); bottom: 0; }

    /* Panel */
    #panel {
      position: fixed; top: var(--header-h); right: 0; width: var(--panel-w); bottom: 0;
      background: var(--bg2); border-left: 1px solid var(--border);
      overflow-y: auto; z-index: 1000; padding: 16px;
    }
    #panel::-webkit-scrollbar { width: 5px; }
    #panel::-webkit-scrollbar-track { background: var(--bg); }
    #panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    /* Panel section title */
    .p-title {
      font-size: 0.68rem; letter-spacing: 0.1em; color: var(--text2);
      text-transform: uppercase; margin-bottom: 14px; padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    /* Gravity panel */
    .pair-row {
      display: flex; flex-direction: column; gap: 4px;
      padding: 10px 0; border-bottom: 1px solid var(--border);
    }
    .pair-row:last-child { border-bottom: none; }
    .pair-top { display: flex; align-items: center; gap: 8px; font-size: 0.78rem; }
    .pair-rank { color: var(--text2); width: 18px; flex-shrink: 0; }
    .pair-name { flex: 1; color: var(--text); }
    .pair-score { color: var(--accent-b); font-weight: 700; font-size: 0.75rem; }
    .pair-bar-bg { height: 4px; background: var(--border2); border-radius: 2px; margin-top: 2px; }
    .pair-bar-fg { height: 4px; background: var(--accent-b); border-radius: 2px; }
    .pair-dist { font-size: 0.68rem; color: var(--text2); }

    /* Concentration panel */
    .conf-badge {
      display: inline-block; font-size: 0.72rem; font-weight: 700;
      padding: 3px 10px; border-radius: 12px; margin-bottom: 10px; letter-spacing: 0.04em;
    }
    .conf-note { font-size: 0.7rem; color: var(--accent-b); margin-bottom: 14px; line-height: 1.5; }
    .stat-row {
      display: flex; justify-content: space-between; font-size: 0.78rem;
      padding: 6px 0; border-bottom: 1px solid var(--border);
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { color: var(--text2); }
    .stat-val   { color: var(--text); font-weight: 600; }
    .section-gap { margin-top: 20px; }

    /* Insight card */
    .insight-card {
      margin-top: 18px;
      background: #0a1628; border: 1px solid #1e3a5f;
      border-left: 3px solid var(--accent);
      border-radius: 8px; padding: 14px 14px 12px;
    }
    .insight-label {
      font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 8px;
    }
    .insight-synthesis {
      font-size: 0.76rem; color: #b0c4de; line-height: 1.75; margin-bottom: 10px;
    }
    .insight-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 9px; }
    .insight-tag {
      font-size: 0.62rem; font-weight: 700; padding: 2px 8px;
      border-radius: 4px; letter-spacing: 0.05em; text-transform: uppercase;
    }
    .insight-tag.pattern { background: rgba(0,207,255,0.12); color: var(--accent); }
    .insight-tag.network { background: rgba(255,159,67,0.12); color: var(--accent-b); }
    .insight-compare { font-size: 0.68rem; color: #4a6a8a; line-height: 1.8; }
    .insight-compare span { color: #7799bb; }

    /* Gravity insight strip */
    .gravity-insight-strip {
      background: #0a1628; border-left: 3px solid var(--accent-b);
      border-radius: 6px; padding: 10px 12px; margin-bottom: 14px;
    }
    .gravity-insight-strip .gi-label {
      font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--accent-b); margin-bottom: 4px;
    }
    .gravity-insight-strip .gi-headline {
      font-size: 0.78rem; color: #cdd6f4; line-height: 1.5; margin-bottom: 4px;
    }
    .gravity-insight-strip .gi-sub {
      font-size: 0.66rem; color: #4a6a8a;
    }

    /* Tooltip */
    #tooltip {
      position: fixed; background: rgba(13,13,26,0.93); border: 1px solid #1e1e3a;
      border-radius: 8px; padding: 10px 14px; pointer-events: none; font-size: 0.82rem;
      color: #cdd6f4; display: none; z-index: 9000; max-width: 240px;
      line-height: 1.6; backdrop-filter: blur(6px);
    }
    #tooltip.pinned { pointer-events: all; }
    #tooltip .tt-title { font-weight: 700; color: var(--accent); margin-bottom: 3px; }
    #tooltip .tt-title.pair { color: var(--accent-b); }
    #tooltip .tt-sub { color: var(--text2); font-size: 0.76rem; }
    #tooltip .tt-val { color: var(--text); font-weight: 600; }

    /* Loading / error */
    #status-overlay {
      position: fixed; top: var(--header-h); left: 0; right: var(--panel-w); bottom: 0;
      background: rgba(13,13,26,0.85); display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 1500; gap: 12px;
    }
    #status-overlay.hidden { display: none; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #status-msg { color: var(--text2); font-size: 0.85rem; }

    /* Pulse animation */
    @keyframes pulse { 0% { stroke-dashoffset: 200; } 100% { stroke-dashoffset: 0; } }

    /* ── NL Query bar ─────────────────────────────── */
    #nl-bar {
      position: fixed; top: var(--header-h); left: 0; right: var(--panel-w);
      background: var(--bg2); border-bottom: 1px solid var(--border);
      padding: 8px 16px; display: flex; align-items: center; gap: 10px;
      z-index: 1800; transition: opacity 0.3s;
    }
    #nl-input {
      flex: 1; background: var(--bg); border: 1px solid var(--border2);
      border-radius: 20px; padding: 7px 16px; color: var(--text);
      font-size: 0.82rem; outline: none; transition: border-color 0.2s;
    }
    #nl-input::placeholder { color: var(--text2); }
    #nl-input:focus { border-color: var(--accent); }
    #nl-ask-btn {
      background: var(--accent); color: #0d0d1a; border: none;
      border-radius: 20px; padding: 7px 18px; font-size: 0.82rem;
      font-weight: 700; cursor: pointer; white-space: nowrap;
      transition: opacity 0.2s;
    }
    #nl-ask-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    /* NL status bar */
    #nl-status {
      position: fixed; top: calc(var(--header-h) + 46px); left: 0; right: var(--panel-w);
      padding: 5px 20px; font-size: 0.75rem; z-index: 1799; min-height: 26px;
      display: flex; align-items: center; gap: 8px; background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    #nl-status.hidden { display: none; }
    .nl-badge {
      font-size: 0.68rem; font-weight: 700; padding: 2px 8px;
      border-radius: 10px; white-space: nowrap; flex-shrink: 0;
    }
    .nl-badge.high   { background: rgba(46,213,115,0.15); color: #2ed573; border: 1px solid #2ed57344; }
    .nl-badge.medium { background: rgba(255,213,42,0.15);  color: #ffd32a; border: 1px solid #ffd32a44; }
    .nl-badge.low    { background: rgba(255,71,87,0.15);   color: #ff4757; border: 1px solid #ff475744; }
    #nl-explanation { color: var(--text2); flex: 1; }

    /* Shift map+panel down when NL bar is visible */
    body.nl-active #map,
    body.nl-active #status-overlay { top: calc(var(--header-h) + 72px); }
    body.nl-active #panel          { top: calc(var(--header-h) + 72px); }

    /* ── NL Answer Box ────────────────────────────── */
    #nl-answer-box {
      display: none;
      position: fixed;
      top: calc(var(--header-h) + 74px);
      left: 16px;
      width: 380px;
      max-height: 55vh;
      overflow-y: auto;
      z-index: 1798;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }
    .nl-answer {
      background: #060d1a;
      border: 1px solid #1e3a5f;
      border-left: 3px solid #00cfff;
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    .nl-answer.error       { border-left-color: #ff4757; }
    .nl-answer.explanation { border-left-color: #ff9f43; }
    .nl-answer.navigation  { border-left-color: #2ed573; }
    .nl-answer-headline {
      font-size: 13px; font-weight: 700;
      color: #00cfff; margin-bottom: 12px;
    }
    .nl-answer-text { color: #aaa; font-size: 12px; line-height: 1.6; }
    .nl-facts { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
    .nl-fact  { display: flex; justify-content: space-between; align-items: center; }
    .nl-fact-label { color: #6b8cae; }
    .nl-fact-value { color: #fff; font-weight: 600; }
    .nl-insight {
      font-size: 11px; color: #aaa; line-height: 1.7;
      margin: 10px 0; padding-top: 10px;
      border-top: 1px solid #1e3a5f;
    }
    .nl-action-btn {
      margin-top: 10px; padding: 6px 14px;
      background: #00cfff20; border: 1px solid #00cfff44;
      color: #00cfff; border-radius: 5px;
      cursor: pointer; font-size: 11px;
      transition: background 0.2s; display: block; width: 100%;
    }
    .nl-action-btn:hover { background: #00cfff35; }
    /* Compare */
    .nl-compare-grid {
      display: flex; align-items: stretch;
      gap: 8px; margin: 10px 0;
    }
    .nl-compare-col {
      flex: 1; padding: 10px;
      background: #0d1f33; border-radius: 6px;
      border: 1px solid #1e3a5f; cursor: pointer;
      text-align: center; transition: border-color 0.2s;
    }
    .nl-compare-col:hover  { border-color: #00cfff44; }
    .nl-compare-col.winner { border-color: #ff9f43; }
    .nl-compare-country { font-size: 12px; font-weight: 700; color: #fff; }
    .nl-compare-value   { font-size: 22px; font-weight: 700; color: #ff9f43; margin: 4px 0; }
    .nl-compare-pattern { font-size: 9px; text-transform:uppercase; letter-spacing:1px; }
    .nl-compare-pattern.monocentric  { color: #ff4757; }
    .nl-compare-pattern.polycentric  { color: #00cfff; }
    .nl-compare-pattern.transitional { color: #ff9f43; }
    .nl-compare-rank    { font-size: 10px; color: #4a6a8a; margin-top: 4px; }
    .nl-compare-vs      { font-size: 11px; color: #4a6a8a; align-self: center; flex-shrink: 0; }
    .nl-verdict {
      font-size: 11px; color: #ccc; line-height: 1.6;
      padding-top: 10px; border-top: 1px solid #1e3a5f;
    }
    /* Recommendation */
    .nl-rec-list { display: flex; flex-direction: column; gap: 4px; margin: 8px 0; }
    .nl-rec-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px; background: #0d1f33; border-radius: 5px;
      border: 1px solid #1e3a5f; cursor: pointer;
      transition: border-color 0.15s;
    }
    .nl-rec-item:hover { border-color: #00cfff44; }
    .nl-rec-rank  { font-size: 10px; color: #4a6a8a; width: 20px; }
    .nl-rec-name  { flex: 1; font-size: 12px; color: #ddd; }
    .nl-rec-val   { font-size: 12px; font-weight: 700; color: #ff9f43; }
    /* Explanation */
    .nl-expl-def     { color: #ccc; font-size: 12px; line-height: 1.7; margin-bottom: 10px; }
    .nl-expl-formula {
      background: #0d1f33; border: 1px solid #1e3a5f;
      border-radius: 4px; padding: 8px 12px; margin-bottom: 8px;
      font-family: monospace; font-size: 11px; color: #00cfff;
    }
    .nl-expl-example { font-size: 11px; color: #aaa; line-height: 1.6; }
    /* Suggestions */
    .nl-suggestions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .nl-suggestion  {
      font-size: 10px; padding: 4px 8px;
      background: #0d1f33; border: 1px solid #1e3a5f;
      border-radius: 4px; cursor: pointer; color: #aaa;
      transition: all 0.15s;
    }
    .nl-suggestion:hover { border-color: #00cfff; color: #00cfff; }

    /* ── Math Transparency Layer ──────────────────── */
    .show-math-btn {
      font-size: 9px; padding: 2px 6px;
      background: transparent; border: 1px solid #00cfff44;
      color: #00cfff88; border-radius: 3px; cursor: pointer;
      margin-left: 6px; transition: all 0.2s; vertical-align: middle;
    }
    .show-math-btn:hover { background: #00cfff22; color: #00cfff; border-color: #00cfff; }
    .math-panel {
      background: #060d1a; border: 1px solid #1e3a5f;
      border-left: 3px solid #00cfff; border-radius: 6px;
      padding: 12px; margin-top: 8px; font-size: 11px;
      line-height: 1.9; animation: fadeIn 0.2s ease; position: relative;
    }
    .math-title { color: #00cfff; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .math-formula {
      font-family: 'Courier New', monospace; color: #ff9f43;
      font-size: 13px; margin-bottom: 10px;
      padding: 6px 8px; background: #0d1f33; border-radius: 4px;
    }
    .math-step { display: flex; justify-content: space-between; gap: 12px; padding: 2px 0; border-bottom: 1px solid #0d1f33; }
    .math-step.highlight { color: #fff; font-weight: 700; border-bottom: none; margin-top: 4px; }
    .math-label { color: #6b8cae; }
    .math-value { color: #ccc; text-align: right; }
    .math-divider { border-top: 1px solid #1e3a5f; margin: 8px 0; }
    .math-note { color: #4a6a8a; font-size: 10px; margin-top: 8px; line-height: 1.5; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }
    .tt-math-link {
      display: block; margin-top: 6px; font-size: 10px;
      color: #00cfff88; cursor: pointer; text-decoration: underline dotted;
      pointer-events: all;
    }
    .tt-math-link:hover { color: #00cfff; }
  </style>
</head>
<body>

<header id="header">
  <span id="hdr-title">🌐 Urban Analytics</span>
  <span id="hdr-country"></span>
  <span id="hdr-status" style="color:var(--text2);font-size:0.75rem;">Loading data…</span>
  <!-- Country selector shown on GitHub Pages -->
  <select id="countrySelect" style="display:none; padding:6px 10px; border:1px solid #00cfff44;
    border-radius:6px; background:#111827; color:#cdd6f4; font-size:0.8rem;
    width:180px; outline:none; cursor:pointer;">
    <option value="">Select country…</option>
  </select>
  <div class="toggle-wrap">
    <button class="toggle-btn active" id="btn-gravity"        onclick="switchMode('gravity')">⚡ Gravity</button>
    <button class="toggle-btn"        id="btn-concentration"  onclick="switchMode('concentration')">📊 Concentration</button>
    <a href="ranking.html" style="text-decoration:none;">
      <button class="toggle-btn">🌍 Global Ranking</button>
    </a>
  </div>
</header>

<!-- NL Query bar (shown after data loads) -->
<div id="nl-bar" style="display:none;">
  <input id="nl-input" type="text"
         placeholder='Ask anything — e.g. "Is France more concentrated than Germany?" or "Most distributed in Europe"'
         onkeydown="if(event.key==='Enter') NLEngine.process(this.value)" />
  <button id="nl-ask-btn" onclick="NLEngine.process(document.getElementById('nl-input').value)">🧠 Ask</button>
</div>
<div id="nl-status" class="hidden"></div>
<div id="nl-answer-box"></div>

<div id="map"></div>
<div id="panel"></div>
<div id="tooltip"></div>

<div id="status-overlay">
  <div class="spinner"></div>
  <div id="status-msg">Loading data…</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
// ════════════════════════════════════════════════
//  ENVIRONMENT
// ════════════════════════════════════════════════
const IS_LOCAL = ['localhost','127.0.0.1'].includes(window.location.hostname);

const AVAILABLE_COUNTRIES = [
  "Argentina","Australia","Brazil","Canada","China",
  "Colombia","Egypt","Ethiopia","France","Germany",
  "India","Indonesia","Iran","Italy","Japan",
  "Kenya","Mexico","Nigeria","Pakistan","Philippines",
  "Poland","Russia","South Korea","Spain","Tanzania",
  "Thailand","Turkey","United Kingdom","United States","Vietnam",
];

// ════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════
let currentMode       = 'gravity';
let gravityData       = null;
let concentrationData = null;

// ════════════════════════════════════════════════
//  MAP SETUP
// ════════════════════════════════════════════════
const map = L.map('map', { zoomControl: true }).setView([51.2, 10.4], 6);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO', maxZoom: 18
}).addTo(map);

L.svg().addTo(map);
const svg = d3.select('#map').select('svg').style('overflow', 'visible');
const g   = svg.append('g').attr('class', 'leaflet-zoom-hide');

const project = (lng, lat) => map.latLngToLayerPoint(new L.LatLng(lat, lng));

// ════════════════════════════════════════════════
//  REPROJECT  (handles both modes)
// ════════════════════════════════════════════════
function reproject() {
  g.selectAll('line.gravity-line, line.pulse-line')
    .attr('x1', d => project(d.lng_a, d.lat_a).x)
    .attr('y1', d => project(d.lng_a, d.lat_a).y)
    .attr('x2', d => project(d.lng_b, d.lat_b).x)
    .attr('y2', d => project(d.lng_b, d.lat_b).y);
  g.selectAll('circle.city-node')
    .attr('cx', d => project(d.lng, d.lat).x)
    .attr('cy', d => project(d.lng, d.lat).y);
}
map.on('zoomend moveend viewreset', reproject);

// ════════════════════════════════════════════════
//  TOOLTIP
// ════════════════════════════════════════════════
const tip    = document.getElementById('tooltip');
const fmtPop = d3.format(',');
const fmtPct = v => v.toFixed(1) + '%';

function showTip(html, ev) {
  tip.innerHTML = html;
  tip.style.display = 'block';
  // Allow pointer events when tooltip contains a clickable math link
  tip.style.pointerEvents = html.includes('tt-math-link') ? 'all' : 'none';
  moveTip(ev);
}
function moveTip(ev) {
  tip.style.left = Math.min(ev.clientX + 14, window.innerWidth  - 230) + 'px';
  tip.style.top  = Math.min(ev.clientY - 10, window.innerHeight - 130) + 'px';
}
function hideTip() { tip.style.display = 'none'; }

// ════════════════════════════════════════════════
//  COLOUR HELPERS
// ════════════════════════════════════════════════
function primacyColor(p)    { return p < 0.15 ? '#00cfff' : p < 0.35 ? '#ff9f43' : '#ff4757'; }
function primacyCategory(p) { return p < 0.15 ? 'Distributed' : p < 0.35 ? 'Moderate' : 'Dominant'; }
const RANK_COLORS = ['#ff4757','#ff9f43','#ffd32a','#7bed9f','#70a1ff'];

// ════════════════════════════════════════════════
//  GRAVITY MAP
// ════════════════════════════════════════════════
function drawGravityMap() {
  const cities = gravityData.cities;
  const pairs  = gravityData.pairs;

  const [minP, maxP] = d3.extent(cities, d => d.population);
  const [minG, maxG] = d3.extent(pairs,  d => d.gravity);
  const radScale   = d3.scaleSqrt().domain([minP, maxP]).range([4, 20]);
  const wScale     = d3.scaleLinear().domain([minG, maxG]).range([1, 6]);
  const opacScale  = d3.scaleLinear().domain([minG, maxG]).range([0.2, 0.9]);

  // Base lines
  g.selectAll('line.gravity-line')
    .data(pairs).join('line').attr('class', 'gravity-line')
    .attr('stroke', '#ff9f43')
    .attr('stroke-width',   d => wScale(d.gravity))
    .attr('stroke-opacity', d => opacScale(d.gravity))
    .attr('stroke-linecap', 'round').attr('cursor', 'pointer')
    .on('mouseover', (ev, d) => {
      window._currentPair = d;
      showTip(`
        <div class="tt-title pair">${d.city_a} → ${d.city_b}</div>
        <div class="tt-sub">Gravity: <span class="tt-val">${d.gravity.toFixed(4)}</span></div>
        <div class="tt-sub">Distance: <span class="tt-val">${d.distance_km} km</span></div>
        <div class="tt-sub">${d.city_a}: <span class="tt-val">${fmtPop(d.pop_a)}</span></div>
        <div class="tt-sub">${d.city_b}: <span class="tt-val">${fmtPop(d.pop_b)}</span></div>
        <span class="tt-math-link" onclick="MathTransparency.showHaversine(window._currentPair)">📐 How was ${d.distance_km}km calculated?</span>
      `, ev);
    })
    .on('mousemove', moveTip).on('mouseout', hideTip);

  // Pulse lines
  g.selectAll('line.pulse-line')
    .data(pairs).join('line').attr('class', 'pulse-line')
    .attr('stroke', '#ffffff')
    .attr('stroke-width',     d => 1 + d.gravity * 3)
    .attr('stroke-dasharray', '8 192')
    .attr('stroke-linecap',   'round')
    .attr('opacity',          d => 0.4 + d.gravity * 0.6)
    .attr('pointer-events',   'none')
    .style('animation', d => `pulse ${(3 - d.gravity * 2).toFixed(2)}s linear infinite`);

  // City circles
  g.selectAll('circle.city-node')
    .data(cities).join('circle').attr('class', 'city-node')
    .attr('r',            d => radScale(d.population))
    .attr('fill',         '#00cfff')
    .attr('fill-opacity', 0.85)
    .attr('stroke',       '#0d0d1a').attr('stroke-width', 1.5)
    .attr('cursor',       'pointer')
    .on('mouseover', (ev, d) => showTip(`
      <div class="tt-title">#${d.rank} ${d.city}</div>
      <div class="tt-sub">Population: <span class="tt-val">${fmtPop(d.population)}</span></div>
    `, ev))
    .on('mousemove', moveTip).on('mouseout', hideTip);

  reproject();
  const lats = cities.map(c => c.lat), lngs = cities.map(c => c.lng);
  map.fitBounds([[d3.min(lats), d3.min(lngs)], [d3.max(lats), d3.max(lngs)]], { padding: [50, 50] });
}

function drawConcentrationMap() {

  const top5 = concentrationData.top5

  'United States','United Kingdom','United Arab Emirates','Saudi Arabia','South Africa',
  'South Korea','North Korea','New Zealand','Costa Rica','Dominican Republic',
  'El Salvador','Bosnia and Herzegovina','Central African Republic','Sri Lanka',
  'Burkina Faso','Afghanistan','Albania','Algeria','Andorra','Angola','Argentina',
  'Armenia','Australia','Austria','Azerbaijan','Bahrain','Bangladesh','Belarus',
  'Belgium','Benin','Bolivia','Botswana','Brazil','Bulgaria','Cambodia','Cameroon',
  'Canada','Chad','Chile','China','Colombia','Congo','Croatia','Cuba',
  'Czech Republic','Denmark','Ecuador','Egypt','Ethiopia','Finland','France',
  'Georgia','Germany','Ghana','Greece','Guatemala','Haiti','Honduras','Hungary',
  'India','Indonesia','Iran','Iraq','Ireland','Israel','Italy','Jamaica','Japan',
  'Jordan','Kazakhstan','Kenya','Kuwait','Kyrgyzstan','Laos','Latvia','Lebanon',
  'Libya','Lithuania','Luxembourg','Malaysia','Mali','Mexico','Moldova','Mongolia',
  'Morocco','Mozambique','Myanmar','Nepal','Netherlands','Nicaragua','Niger',
  'Nigeria','Norway','Oman','Pakistan','Palestine','Panama','Paraguay','Peru',
  'Philippines','Poland','Portugal','Qatar','Romania','Russia','Rwanda','Senegal',
  'Serbia','Singapore','Slovakia','Slovenia','Somalia','Spain','Sudan','Sweden',
  'Switzerland','Syria','Taiwan','Tajikistan','Tanzania','Thailand','Tunisia',
  'Turkey','Turkmenistan','Uganda','Ukraine','Uruguay','Uzbekistan','Venezuela',
  'Vietnam','Yemen','Zambia','Zimbabwe'
];

const COUNTRY_ALIASES = {
  'usa': 'United States', 'u.s.a': 'United States', 'america': 'United States',
  'uk': 'United Kingdom', 'britain': 'United Kingdom', 'england': 'United Kingdom',
  'uae': 'United Arab Emirates', 'korea': 'South Korea',
  'czechia': 'Czech Republic', 'holland': 'Netherlands',
};

function extractCountry(text) {
  const lower = text.toLowerCase();
  for (const [alias, name] of Object.entries(COUNTRY_ALIASES)) {
    if (new RegExp(`\\b${alias}\\b`, 'i').test(lower)) return name;
  }
  for (const country of COUNTRY_LIST) {
    if (lower.includes(country.toLowerCase())) return country;
  }
  return null;
}

// ── Hybrid classifier: keywords first, ML model fallback ────────
const GRAVITY_KEYWORDS      = ['gravity','network','connect','attract','link','pull','pairs','between cities','city pairs'];
const CONCENTRATION_KEYWORDS = ['dominat','primacy','concentrat','which city','spread','distributed','urban hierarch','biggest city','most powerful','urban structure','one city'];

function keywordClassify(query) {
  const q = query.toLowerCase();
  const gScore = GRAVITY_KEYWORDS.filter(k => q.includes(k)).length;
  const cScore = CONCENTRATION_KEYWORDS.filter(k => q.includes(k)).length;
  if (gScore === 0 && cScore === 0) return null;           // no keywords → use ML
  const isConc   = cScore > gScore;
  const strength = Math.max(gScore, cScore);
  const conf     = Math.min(0.97, 0.88 + (strength - 1) * 0.04);
  return { mode: isConc ? 'concentration' : 'gravity', confidence: conf };
}

// ── Transformers.js pipeline (lazy-loaded, cached) ──────────────
let _classifierPromise = null;

async function getClassifier() {
  if (_classifierPromise) return _classifierPromise;

  _classifierPromise = (async () => {
    setNLStatus('📥 Loading AI model (first use only, ~20 MB)…', null);

    const { pipeline, env } = await import(
      'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2'
    );
    env.allowLocalModels = false;

    return pipeline(
      'zero-shot-classification',
      'Xenova/nli-deberta-v3-small',
      {
        progress_callback(info) {
          if (info.status === 'downloading' && info.total > 0) {
            const pct = Math.round((info.loaded / info.total) * 100);
            setNLStatus(`📥 Downloading AI model: ${pct}%`, null);
          }
        },
      }
    );
  })();

  return _classifierPromise;
}

// ── Status helpers ────────────────────────────────────────────────
function setNLStatus(explanation, confidence) {
  const bar = document.getElementById('nl-status');
  bar.classList.remove('hidden');
  bar.innerHTML = '';

  if (confidence !== null) {
    let tier, label;
    if      (confidence >= 0.85) { tier = 'high';   label = '🟢 High'; }
    else if (confidence >= 0.70) { tier = 'medium'; label = '🟡 Moderate'; }
    else                         { tier = 'low';    label = '🔴 Low'; }
    const badge = document.createElement('span');
    badge.className = `nl-badge ${tier}`;
    badge.textContent = `${label} — ${Math.round(confidence * 100)}%`;
    bar.appendChild(badge);
  }

  const txt = document.createElement('span');
  txt.id = 'nl-explanation';
  txt.textContent = explanation;
  bar.appendChild(txt);
}

// ── Main NL handler ───────────────────────────────────────────────
async function handleNLQuery() {
  const input = document.getElementById('nl-input');
  const btn   = document.getElementById('nl-ask-btn');
  const query = input.value.trim();
  if (!query) return;

  btn.disabled = true;
  btn.textContent = '⏳';

  try {
    // 1. Try keyword matching first (instant, no model needed)
    let classification = keywordClassify(query);

    // 2. Fall back to ML model for ambiguous queries
    if (!classification) {
      const clf = await getClassifier();
      setNLStatus('🧠 Parsing intent…', null);
      const result = await clf(query, [
        'gravity connections and attraction between cities',
        'urban primacy concentration and city dominance',
      ]);
      const isConc = result.labels[0].includes('primacy');
      classification = { mode: isConc ? 'concentration' : 'gravity', confidence: result.scores[0] };
    }

    const { mode, confidence } = classification;
    const country = extractCountry(query);

    const modeDesc = mode === 'concentration'
      ? 'urban primacy — how much one city dominates'
      : 'gravity network — city connections by mass and distance';
    const explanation = country
      ? `Showing ${modeDesc} for ${country}`
      : `Showing ${modeDesc} for current country`;

    await executeIntent({ country, mode, confidence, explanation });

  } catch (e) {
    setNLStatus(`❌ ${e.message}`, null);
  }

  btn.disabled = false;
  btn.textContent = '🧠 Ask';
}

// ── Execute parsed intent (auto-switches country via server.py or data/) ──
async function executeIntent(intent) {
  const { country, mode, confidence, explanation } = intent;
  const btn = document.getElementById('nl-ask-btn');

  if (confidence < 0.55) {
    setNLStatus(
      `⚠️ Not confident enough${country ? ` — did you mean "${country}"?` : ''}. Try rephrasing.`,
      confidence
    );
    return;
  }

  const loadedCountry = gravityData?.country?.toLowerCase();
  const targetCountry = country?.toLowerCase();
  const needsSwitch   = targetCountry && targetCountry !== loadedCountry;

  if (needsSwitch) {
    setNLStatus(`🔄 Switching to ${country}…`, null);
    btn.disabled = true; btn.textContent = '⏳';

    try {
      let gd, cd;
      if (IS_LOCAL) {
        // Local: run pipeline via server.py, then load root JSONs
        const res = await fetch(`/run-pipeline?country=${encodeURIComponent(country)}`);
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `Server returned ${res.status}. Is server.py running?`);
        }
        const ts = Date.now();
        [gd, cd] = await Promise.all([
          d3.json(`gravity_data.json?t=${ts}`),
          d3.json(`concentration.json?t=${ts}`),
        ]);
      } else {
        // GH Pages: load from pre-generated data/ folder
        [gd, cd] = await loadFromData(country);
      }

      gravityData       = gd;
      concentrationData = cd;
      const meta = gd.meta || {};
      document.getElementById('hdr-country').textContent = gd.country;
      document.getElementById('hdr-status').textContent  =
        `${meta.total_cities ?? gd.cities?.length ?? '?'} cities · ${meta.total_pairs ?? gd.pairs?.length ?? '?'} pairs`;
      const sel = document.getElementById('countrySelect');
      if (sel) sel.value = gd.country;

    } catch (e) {
      setNLStatus(
        `❌ ${e.message}${IS_LOCAL ? ' — Make sure server.py is running' : ''}`,
        confidence
      );
      btn.disabled = false; btn.textContent = '🧠 Ask';
      return;
    }

    btn.disabled = false; btn.textContent = '🧠 Ask';
  }

  setNLStatus(explanation, confidence);
  if (mode === 'concentration') switchMode('concentration');
  else                          switchMode('gravity');
}

// ════════════════════════════════════════════════
//  DATA LOAD  (URL-param aware, local + GH Pages)
// ════════════════════════════════════════════════
const overlay   = document.getElementById('status-overlay');
const statusMsg = document.getElementById('status-msg');

function _applyData(gd, cd) {
  gravityData       = gd;
  concentrationData = cd;
  document.getElementById('hdr-country').textContent = gd.country || '—';
  const meta = gd.meta || {};
  document.getElementById('hdr-status').textContent  =
    `${meta.total_cities ?? gd.cities?.length ?? '?'} cities · ${meta.total_pairs ?? gd.pairs?.length ?? '?'} pairs`;
  overlay.classList.add('hidden');
  document.getElementById('nl-bar').style.display = 'flex';
  document.body.classList.add('nl-active');
  // Update dropdown to reflect loaded country
  const sel = document.getElementById('countrySelect');
  if (sel && gd.country) sel.value = gd.country;
  switchMode('gravity');
}

// Load from data/<Country>/ folder (works on both local and GitHub Pages)
async function loadFromData(country) {
  const folder = `data/${country.replace(/ /g, '_')}`;
  const ts = IS_LOCAL ? `?t=${Date.now()}` : '';
  const [gd, cd] = await Promise.all([
    d3.json(`${folder}/gravity_data.json${ts}`),
    d3.json(`${folder}/concentration.json${ts}`),
  ]);
  return [gd, cd];
}

function _showRetry() {
  const existing = document.getElementById('retry-btn');
  if (existing) return;
  const btn = document.createElement('button');
  btn.id = 'retry-btn';
  btn.textContent = '🔄 Retry';
  btn.style.cssText = `
    margin-top:14px; padding:7px 20px; background:#00cfff22;
    color:#00cfff; border:1px solid #00cfff44; border-radius:20px;
    cursor:pointer; font-size:0.82rem; display:block;
  `;
  btn.onclick = () => {
    btn.remove();
    document.querySelector('.spinner').style.display = '';
    statusMsg.textContent = 'Loading data…';
    statusMsg.style.color = '';
    initialLoad();
  };
  overlay.appendChild(btn);
}

async function initialLoad() {
  const params     = new URLSearchParams(window.location.search);
  const urlCountry = params.get('country');
  const urlMode    = params.get('mode');   // 'gravity' | 'concentration'

  // honour ?mode= param before data loads (sets active toggle)
  if (urlMode === 'gravity' || urlMode === 'concentration') {
    currentMode = urlMode;
    document.getElementById('btn-gravity').classList.toggle('active', urlMode === 'gravity');
    document.getElementById('btn-concentration').classList.toggle('active', urlMode === 'concentration');
  }

  // ── GH Pages: load everything from data/ folder ─────────────
  if (!IS_LOCAL) {
    const country = urlCountry || 'Germany';
    statusMsg.textContent = `Loading ${country}…`;
    try {
      const [gd, cd] = await loadFromData(country);
      _applyData(gd, cd);
    } catch (e) {
      console.error('GH Pages load error:', e);
      statusMsg.textContent = `Data not available for "${country}" — select another country`;
      statusMsg.style.color = '#ff4757';
      document.querySelector('.spinner').style.display = 'none';
      _showRetry();
    }
    return;
  }

  // ── Local: if ?country= in URL, run pipeline first ───────────
  if (urlCountry) {
    statusMsg.textContent = `⏳ Running pipeline for ${urlCountry}…`;
    statusMsg.style.color = '#ff9f43';
    try {
      const res = await fetch(`/run-pipeline?country=${encodeURIComponent(urlCountry)}`);
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || `Pipeline failed (HTTP ${res.status}) — is server.py running?`);
      }
      statusMsg.textContent = `📊 Loading data…`;
      const ts = Date.now();
      const [gd, cd] = await Promise.all([
        d3.json(`gravity_data.json?t=${ts}`),
        d3.json(`concentration.json?t=${ts}`),
      ]);
      _applyData(gd, cd);
    } catch (e) {
      console.error('Pipeline error:', e);
      statusMsg.textContent = `❌ ${e.message}`;
      statusMsg.style.color = '#ff4757';
      document.querySelector('.spinner').style.display = 'none';
      _showRetry();
    }
    return;
  }

  // ── Local: load root JSONs (existing files from last pipeline run) ──
  try {
    const [gd, cd] = await Promise.all([
      d3.json('gravity_data.json'),
      d3.json('concentration.json')
    ]);
    _applyData(gd, cd);
  } catch (e) {
    console.error('Data load error:', e);
    const isNetwork = e instanceof TypeError;
    if (isNetwork) {
      statusMsg.textContent = '⚠️ Cannot reach server — open via http://localhost:8000, not file://';
    } else {
      statusMsg.textContent = `⚠️ ${e.message || 'Data files not found'} — run: python generate_gravity.py`;
    }
    statusMsg.style.color = '#ff4757';
    document.querySelector('.spinner').style.display = 'none';
    _showRetry();
  }
}

// ── Populate country dropdown + init on GH Pages ────────────────
document.addEventListener('DOMContentLoaded', () => {
  // Populate select
  const sel = document.getElementById('countrySelect');
  AVAILABLE_COUNTRIES.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    sel.appendChild(opt);
  });

  // Show dropdown on GH Pages
  if (!IS_LOCAL) sel.style.display = 'inline-block';

  // Dropdown change → load country
  sel.addEventListener('change', async () => {
    const country = sel.value;
    if (!country) return;
    overlay.classList.remove('hidden');
    document.querySelector('.spinner').style.display = '';
    statusMsg.textContent = `Loading ${country}…`;
    statusMsg.style.color = '';
    const existing = document.getElementById('retry-btn');
    if (existing) existing.remove();
    try {
      const [gd, cd] = await loadFromData(country);
      _applyData(gd, cd);
    } catch (e) {
      statusMsg.textContent = `Data not available for "${country}"`;
      statusMsg.style.color = '#ff4757';
      document.querySelector('.spinner').style.display = 'none';
    }
  });

  // NL query Enter key
  document.getElementById('nl-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleNLQuery();
  });
});

initialLoad();
</script>

<!-- ════════════════════════════════════════════════
     MATH TRANSPARENCY LAYER  (Prompt 15)
     Self-contained module — reads existing data, renders math panels.
     ════════════════════════════════════════════════ -->
<script>
const MathTransparency = {

  fmt(n) {
    if (n == null || isNaN(n)) return '—';
    return Number(n).toLocaleString('en-US');
  },

  buildPrimacyPanel(data) {
    const largest = data.largest_city;
    const total   = data.total_population;
    const primacy = data.primacy_index;
    return `
      <div class="math-panel">
        <div class="math-title">📐 Primacy Index — How it's calculated</div>
        <div class="math-formula">P = P<sub>largest</sub> / Σ P<sub>all cities</sub></div>
        <div class="math-step">
          <span class="math-label">P<sub>largest</sub></span>
          <span class="math-value">${largest.city} = ${this.fmt(largest.population)}</span>
        </div>
        <div class="math-step">
          <span class="math-label">Σ P<sub>all</sub></span>
          <span class="math-value">${this.fmt(total)} (${data.total_cities} cities)</span>
        </div>
        <div class="math-divider"></div>
        <div class="math-step">
          <span class="math-label">Calculation</span>
          <span class="math-value">${this.fmt(largest.population)} / ${this.fmt(total)}</span>
        </div>
        <div class="math-step highlight">
          <span class="math-label">Result</span>
          <span class="math-value">${primacy.toFixed(4)} → ${(primacy * 100).toFixed(1)}%</span>
        </div>
        <div class="math-note">
          Threshold: &lt;0.15 distributed · 0.15–0.35 moderate · &gt;0.35 dominant
        </div>
      </div>`;
  },

  buildGravityPanel(pair) {
    const raw = (pair.pop_a * pair.pop_b) / Math.pow(pair.distance_km, 2);
    return `
      <div class="math-panel">
        <div class="math-title">📐 Newton Gravity Model</div>
        <div class="math-formula">G = (P<sub>a</sub> × P<sub>b</sub>) / d²</div>
        <div class="math-step">
          <span class="math-label">P<sub>a</sub> (${pair.city_a})</span>
          <span class="math-value">${this.fmt(pair.pop_a)}</span>
        </div>
        <div class="math-step">
          <span class="math-label">P<sub>b</sub> (${pair.city_b})</span>
          <span class="math-value">${this.fmt(pair.pop_b)}</span>
        </div>
        <div class="math-step">
          <span class="math-label">d (distance)</span>
          <span class="math-value">${pair.distance_km.toFixed(1)} km</span>
        </div>
        <div class="math-step">
          <span class="math-label">d²</span>
          <span class="math-value">${this.fmt(Math.round(Math.pow(pair.distance_km, 2)))}</span>
        </div>
        <div class="math-divider"></div>
        <div class="math-step">
          <span class="math-label">Raw G</span>
          <span class="math-value">${this.fmt(Math.round(raw))}</span>
        </div>
        <div class="math-step highlight">
          <span class="math-label">Normalized</span>
          <span class="math-value">${pair.gravity.toFixed(4)}</span>
        </div>
        <div class="math-note">
          Normalization: (G − G<sub>min</sub>) / (G<sub>max</sub> − G<sub>min</sub>)
        </div>
      </div>`;
  },

  buildHaversinePanel(pair) {
    const toRad = d => d * Math.PI / 180;
    const dLat  = toRad(pair.lat_b - pair.lat_a);
    const dLng  = toRad(pair.lng_b - pair.lng_a);
    const a     = Math.sin(dLat / 2) ** 2 +
                  Math.cos(toRad(pair.lat_a)) * Math.cos(toRad(pair.lat_b)) *
                  Math.sin(dLng / 2) ** 2;
    const c     = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return `
      <div class="math-panel">
        <div class="math-title">📐 Haversine Formula — Great Circle Distance</div>
        <div class="math-formula">d = 2R · atan2(√a, √(1−a))</div>
        <div class="math-step">
          <span class="math-label">${pair.city_a} coords</span>
          <span class="math-value">${pair.lat_a.toFixed(4)}°, ${pair.lng_a.toFixed(4)}°</span>
        </div>
        <div class="math-step">
          <span class="math-label">${pair.city_b} coords</span>
          <span class="math-value">${pair.lat_b.toFixed(4)}°, ${pair.lng_b.toFixed(4)}°</span>
        </div>
        <div class="math-step">
          <span class="math-label">Δlat</span>
          <span class="math-value">${(pair.lat_b - pair.lat_a).toFixed(4)}° → ${dLat.toFixed(4)} rad</span>
        </div>
        <div class="math-step">
          <span class="math-label">Δlng</span>
          <span class="math-value">${(pair.lng_b - pair.lng_a).toFixed(4)}° → ${dLng.toFixed(4)} rad</span>
        </div>
        <div class="math-step">
          <span class="math-label">a</span>
          <span class="math-value">${a.toFixed(6)}</span>
        </div>
        <div class="math-step">
          <span class="math-label">c</span>
          <span class="math-value">${c.toFixed(6)} rad</span>
        </div>
        <div class="math-step">
          <span class="math-label">R (Earth)</span>
          <span class="math-value">6,371 km</span>
        </div>
        <div class="math-divider"></div>
        <div class="math-step highlight">
          <span class="math-label">Distance</span>
          <span class="math-value">${pair.distance_km.toFixed(2)} km</span>
        </div>
        <div class="math-note">
          Why not Euclidean? Straight-line ignores Earth's curvature.
          Haversine gives the shortest path along the surface.
        </div>
      </div>`;
  },

  // Floating overlay — persists after tooltip hides, closeable with ✕
  showHaversine(pair) {
    const existing = document.getElementById('haversine-overlay');
    if (existing) { existing.remove(); return; }
    const overlay = document.createElement('div');
    overlay.id = 'haversine-overlay';
    overlay.style.cssText =
      'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);' +
      'z-index:9999;width:360px;box-shadow:0 4px 24px rgba(0,0,0,0.7);';
    overlay.innerHTML = this.buildHaversinePanel(pair) +
      '<button onclick="document.getElementById(\'haversine-overlay\').remove()" ' +
      'style="position:absolute;top:10px;right:10px;background:transparent;border:none;' +
      'color:#6b8cae;font-size:15px;cursor:pointer;line-height:1;">✕</button>';
    document.body.appendChild(overlay);
  }
};
</script>
